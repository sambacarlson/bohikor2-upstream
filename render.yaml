services:
  - type: web
    name: bohikor2-api
    runtime: docker
    repo: https://github.com/Iknite-Space/bohikor2
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: ENV
        value: production
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      - key: CAMPAY_PERMANENT_ACCESS_TOKEN
        sync: false
      - key: CAMPAY_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
